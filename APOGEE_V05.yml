name: Apogee-pipeline-v05
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Read preprocessing
  - porechop=0.2.4
  - nanofilt=2.8.0
  - seqtk

  # Sequence clustering and chimera removal
  - vsearch=2.28.1

  # Primer trimming (optional, used with -b true)
  - bbmap

  # Read mapping
  - minimap2=2.27

  # Data processing (required by LCA and clustering scripts)
  - pandas=2.0.3
  - numpy=1.24.3

  # System utilities
  - bc
