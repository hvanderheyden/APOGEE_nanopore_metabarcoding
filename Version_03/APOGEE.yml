name: Apogee-pipeline
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Read preprocessing
  - porechop=0.2.4
  - nanofilt=2.8.0
  - seqtk
  
  # Sequence clustering
  - vsearch=2.28.1

  # Trimming (optional)
  - bbmap  
  
  # Read mapping
  - minimap2=2.27
  
  # Analysis and data processing
  - pandas=2.0.3
  - numpy=1.24.3
  
  # System utilities
  - bc